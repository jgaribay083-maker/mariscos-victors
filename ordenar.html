<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ordenar · Burritos y Gorditas el Güero</title>
<style>
  :root{
    --rojo:#0d6e8c; --rojo-osc:#0a566e; --amarillo:#ff6b4a; --amarillo-claro:#ff9d85;
    --crema:#eef8fb; --crema-2:#e1f1f5; --blanco:#fbffff;
    --tinta:#10333f; --tinta-suave:#5a7480; --linea:#cfe6ec;
    --verde:#1f7a45; --verde-claro:#e7f4ec; --wa:#25d366;
    --sombra:0 2px 0 rgba(0,0,0,.04), 0 8px 24px -12px rgba(10,50,70,.35);
    --radio:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Segoe UI",ui-rounded,-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--crema);color:var(--tinta);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:120px}
  .wrap{max-width:540px;margin:0 auto;padding:0 16px}

  header{background:radial-gradient(120% 120% at 50% -10%, var(--rojo) 0%, var(--rojo-osc) 100%);
    color:#fff;text-align:center;padding:18px 16px 22px;border-bottom:5px solid var(--amarillo);position:relative}
  .volver{position:absolute;left:14px;top:16px;color:#fff;text-decoration:none;font-size:14px;font-weight:700;opacity:.9}
  .logo{width:58px;height:58px;border-radius:50%;background:var(--amarillo);color:var(--rojo);
    display:flex;align-items:center;justify-content:center;font:800 30px/1 Georgia,serif;margin:6px auto 9px;box-shadow:0 4px 0 rgba(0,0,0,.15)}
  header h1{font-size:20px;font-family:Georgia,serif}
  header p{font-size:13px;opacity:.92;margin-top:3px}
  .aviso{display:inline-block;margin-top:11px;font-size:12.5px;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:999px}

  .seccion{margin-top:22px}
  .seccion h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--rojo);font-weight:800;
    margin-bottom:2px;display:flex;align-items:center;gap:8px}
  .seccion h2 em{font-style:normal;font-weight:800;font-size:13px;color:#3a2400;background:var(--amarillo);padding:2px 9px;border-radius:999px}
  .seccion h2::after{content:"";flex:1;height:2px;background:var(--linea);border-radius:2px}
  .grupo-nota{font-size:12px;color:var(--tinta-suave);margin:6px 0 -2px}

  .item{display:flex;align-items:center;gap:12px;background:var(--blanco);border:1px solid var(--linea);
    border-radius:var(--radio);padding:12px 12px 12px 14px;margin-top:10px;box-shadow:var(--sombra)}
  .item-info{flex:1;min-width:0}
  .item-info .nom{font-weight:700;font-size:15.5px}
  .item-info .des{font-size:12.5px;color:var(--tinta-suave);margin-top:1px}
  .item-info .pre{font-weight:800;color:var(--rojo);margin-top:3px;font-size:14px}
  .item .badge{font-size:11px;font-weight:800;color:#fff;background:var(--verde);border-radius:999px;padding:2px 8px;margin-left:6px;display:none}
  .item.en-carrito .badge{display:inline-block}

  .add{flex:none;border:none;background:var(--rojo);color:#fff;font-weight:800;font-size:14px;
    padding:11px 16px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 10px -4px rgba(190,44,44,.6)}
  .add:active{transform:translateY(1px)}

  .barra{position:fixed;left:0;right:0;bottom:0;z-index:50;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(255,247,232,0) 0%, var(--crema) 22%)}
  .barra-in{max-width:540px;margin:0 auto}
  .btn{width:100%;border:none;border-radius:14px;cursor:pointer;font-size:16.5px;font-weight:800;padding:16px;
    display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 16px -6px rgba(190,44,44,.6)}
  .btn-rojo{background:var(--rojo);color:#fff}
  .btn-rojo:disabled{background:#d9c9c9;box-shadow:none;cursor:not-allowed;color:#fff}
  .btn-verde{background:var(--verde);color:#fff;box-shadow:0 6px 16px -6px rgba(31,122,69,.6)}
  .btn-amar{background:var(--amarillo);color:#3a2400}
  .btn-fant{background:#fff;color:var(--tinta);border:1.5px solid var(--linea);box-shadow:none}
  .btn .pill{background:rgba(255,255,255,.22);padding:2px 9px;border-radius:999px;font-size:14px}
  .btn:active{transform:translateY(1px)}

  .overlay{position:fixed;inset:0;z-index:100;background:rgba(36,26,22,.5);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  .overlay.on{display:flex}
  .hoja{background:var(--crema);width:100%;max-width:540px;border-radius:22px 22px 0 0;
    padding:8px 16px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:sube .25s ease}
  @keyframes sube{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .grip{width:44px;height:5px;background:var(--linea);border-radius:999px;margin:8px auto 14px}
  .hoja h3{font-size:19px;margin-bottom:2px;font-family:Georgia,serif}
  .hoja .sub{font-size:13px;color:var(--tinta-suave);margin-bottom:8px}

  /* opciones */
  .optg{margin-top:15px}
  .optg .ol{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--tinta-suave);margin-bottom:7px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border:1.5px solid var(--linea);background:#fff;color:var(--tinta);border-radius:11px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer}
  .chip.sel{background:var(--rojo);color:#fff;border-color:var(--rojo)}
  .qtyrow{display:flex;align-items:center;justify-content:space-between;margin-top:18px}
  .qty{display:flex;align-items:center;gap:14px}
  .qty button{width:40px;height:40px;border-radius:11px;border:1.5px solid var(--linea);background:#fff;color:var(--rojo);font-size:22px;font-weight:800;cursor:pointer}
  .qty .n{font-size:18px;font-weight:800;min-width:24px;text-align:center}

  .linea{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px dashed var(--linea)}
  .linea .lz{flex:1;min-width:0}
  .linea .nm{font-weight:700;font-size:14.5px}
  .linea .op{font-size:12px;color:var(--tinta-suave);margin-top:2px}
  .linea .ctrl{display:flex;align-items:center;gap:9px;margin-top:6px}
  .linea .ctrl button{width:28px;height:28px;border-radius:8px;border:1px solid var(--linea);background:#fff;color:var(--rojo);font-weight:800;cursor:pointer}
  .linea .ctrl .c{font-weight:800;min-width:18px;text-align:center}
  .linea .pr{font-weight:800;color:var(--rojo);white-space:nowrap}
  .total-row{display:flex;justify-content:space-between;align-items:baseline;margin:15px 0 4px;font-size:15px}
  .total-row .big{font-size:26px;font-weight:800;color:var(--rojo)}

  label.campo{display:block;margin-top:14px;font-size:13px;font-weight:700;color:var(--tinta-suave)}
  .campo input,.campo select{width:100%;margin-top:6px;padding:13px 14px;font-size:16px;border:1.5px solid var(--linea);border-radius:12px;background:#fff;color:var(--tinta)}
  .campo input:focus,.campo select:focus{outline:none;border-color:var(--rojo)}
  .chip[disabled]{opacity:.45;cursor:not-allowed}
  .tiempo{background:#fff7e6;border:1px solid #f3dca0;color:#7a5a10;border-radius:12px;padding:12px 14px;font-size:13.5px;margin-top:14px;display:flex;gap:9px}
  .tiempo b{display:block}

  .candado{background:var(--verde-claro);border:1px solid #bfe3cc;color:#15532f;border-radius:12px;padding:13px 14px;font-size:13.5px;margin-top:16px;display:flex;gap:10px}
  .candado b{display:block}
  .check{display:flex;gap:11px;align-items:flex-start;margin-top:16px;background:#fff;border:1.5px solid var(--linea);border-radius:12px;padding:13px;cursor:pointer}
  .check input{width:22px;height:22px;accent-color:var(--verde);margin-top:1px;flex:none}
  .check span{font-size:14px}
  .mini{font-size:12px;color:var(--tinta-suave);text-align:center;margin-top:14px;line-height:1.5}
  .pasos{display:flex;gap:6px;margin:2px 0 14px}
  .pasos i{flex:1;height:4px;border-radius:4px;background:var(--linea)}
  .pasos i.on{background:var(--amarillo)}
</style>
</head>
<body>

<header>
  <a class="volver" href="index.html">← Volver</a>
  <div class="logo">🦐</div>
  <h1>Ordena en línea</h1>
  <p>Arma tu pedido, márcalo y pásalo a recoger 🦐</p>
  <div class="aviso">⏱️ Pedidos preparados al momento · fresquecitos</div>
</header>

<main class="wrap" id="menu"></main>

<div class="barra" id="barra" style="display:none">
  <div class="barra-in">
    <button class="btn btn-rojo" id="verCarrito">
      <span>Ver mi pedido</span><span class="pill" id="pillCount">0</span>
      <span style="margin-left:auto" id="pillTotal">$0</span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay"><div class="hoja" id="hoja"></div></div>

<script>
/* ===== CONFIG (cambia solo esto) ===== */
const CONFIG = {
  whatsappComanda: "526361104087",   // WhatsApp de Mariscos El Victor's (comanda)
  linkPago: "",                      // link de pago (pendiente — Mercado Pago/transferencia)
  negocio: "Mariscos El Victor's",
  moneda: "$",
  asaderoExtra: 0,
};

/* ===== MENÚ =====
   ⚠️ PRECIOS DE EJEMPLO — confirmar con el negocio antes de publicar */
const MENU = [
  { grupo:"🍤 Cócteles de camarón", nota:"Bien servidos, con galletas", items:[
    {id:"coc_cam_ch",nom:"Cóctel de camarón chico",pre:110},
    {id:"coc_cam_gr",nom:"Cóctel de camarón grande",pre:150},
    {id:"coc_mixto",nom:"Cóctel mixto",des:"Camarón, pulpo y más",pre:160},
  ]},
  { grupo:"🌶️ Aguachiles", precio:140, nota:"Elige verde o rojo", items:[
    {id:"agua_verde",nom:"Aguachile verde"},
    {id:"agua_rojo",nom:"Aguachile rojo"},
  ]},
  { grupo:"🥑 Tostadas", items:[
    {id:"tos_ceviche",nom:"Tostada de ceviche",pre:45},
    {id:"tos_mixta",nom:"Tostada mixta",pre:55},
    {id:"tosticeviche",nom:"Tosticeviche",des:"Tostada + ceviche cargado",pre:60},
  ]},
  { grupo:"🦪 Shot de ostión", items:[
    {id:"shot_ostion",nom:"Shot de ostión",pre:30},
  ]},
  { grupo:"🥤 Clamatos preparados", items:[
    {id:"clamato",nom:"Clamato preparado",des:"Bien cargado",pre:80},
  ]},
  { grupo:"🥤 Bebidas", items:[
    {id:"refresco",nom:"Refresco",des:"Especifica el sabor al pedir (Coca, etc.)",pre:35,pideSabor:true},
  ]},
];

/* ===== Aplanado con datos de grupo ===== */
const ALL=[];
MENU.forEach(g=>g.items.forEach(i=>{
  ALL.push(Object.assign({_grupo:g.grupo, pre: (i.pre!==undefined?i.pre:g.precio)}, i));
}));
const baseItem = id => ALL.find(i=>i.id===id);

/* ===== Opciones por platillo ===== */
function optsFor(it){
  if(it.pideSabor) return [];
  const esAguachile = it._grupo.indexOf("Aguachil")>=0;
  const sinOpts = it._grupo.indexOf("Ostión")>=0 || it._grupo.indexOf("Clamato")>=0;
  const g=[];
  if(esAguachile) g.push({key:"picante",label:"Nivel de picante",ch:[["normal","Normal"],["picoso","Bien picoso"]],def:"normal"});
  if(!sinOpts) g.push({key:"limon",label:"Limón y salsa",ch:[["aparte","Aparte"],["servido","Ya servido"]],def:"aparte"});
  return g;
}
function esGorditaMaiz(line){ return false; }

/* ===== Carrito (líneas con variantes) ===== */
const carrito = {}; // lineKey -> {id, opts, precio, qty}
const $ = (s,el=document)=>el.querySelector(s);
const money = n => CONFIG.moneda + n.toLocaleString("es-MX");
function lineKey(id,opts){ return id+"|"+["masa","cc","salsa","asadero","quitar"].map(k=>{const v=opts[k];return Array.isArray(v)?v.slice().sort().join("+"):(v||"");}).join(","); }
function precioLinea(it,opts){ return it.pre; }
function optsTexto(line){
  const p=[];
  if(line.opts.picante) p.push(line.opts.picante==="picoso"?"bien picoso":"picante normal");
  if(line.opts.limon) p.push(line.opts.limon==="servido"?"limón ya servido":"limón aparte");
  return p.join(" · ");
}
function nombreCompleto(it){ return it.nom; }
function totales(){ let n=0,t=0; for(const k in carrito){n+=carrito[k].qty; t+=carrito[k].qty*carrito[k].precio;} return {n,t}; }
function leadMin(){ for(const k in carrito){ if(esGorditaMaiz(carrito[k])) return 30; } return 20; }

/* ===== Pintar menú ===== */
function pintarMenu(){
  const cont=$("#menu");
  cont.innerHTML = MENU.map(g=>`
    <section class="seccion">
      <h2>${g.grupo}${g.precio?` <em>${money(g.precio)}</em>`:""}</h2>
      ${g.nota?`<p class="grupo-nota">${g.nota}</p>`:""}
      ${g.items.map(i=>{
        const pre = (i.pre!==undefined?i.pre:g.precio);
        return `<div class="item" data-id="${i.id}">
          <div class="item-info">
            <div class="nom">${i.nom}<span class="badge">en pedido</span></div>
            ${i.des?`<div class="des">${i.des}</div>`:""}
            ${g.precio?"":`<div class="pre">${money(pre)}</div>`}
          </div>
          <button class="add" data-id="${i.id}">Agregar +</button>
        </div>`;
      }).join("")}
    </section>`).join("");
  cont.querySelectorAll(".add").forEach(b=> b.onclick=()=>openOpciones(b.dataset.id));
}

const overlay=$("#overlay"), hoja=$("#hoja");
function abrir(html){ hoja.innerHTML=html; overlay.classList.add("on"); hoja.scrollTop=0; }
function cerrar(){ overlay.classList.remove("on"); }
overlay.onclick=e=>{ if(e.target===overlay) cerrar(); };
$("#verCarrito").onclick=pasoResumen;

/* ===== Sheet de opciones al agregar ===== */
let sel={}, selQty=1, selId=null;
function openOpciones(id){
  const it=baseItem(id); const groups=optsFor(it);
  selId=id; selQty=1; sel={}; groups.forEach(gr=> sel[gr.key]= Array.isArray(gr.def)? gr.def.slice() : gr.def);
  const gruposHtml = groups.map(gr=>`
    <div class="optg" data-key="${gr.key}" data-multi="${gr.multi?1:0}">
      <div class="ol">${gr.label}</div>
      <div class="chips">
        ${gr.ch.map(([v,l])=>{const on=gr.multi?sel[gr.key].includes(v):sel[gr.key]===v;return `<button class="chip${on?" sel":""}" data-v="${v}">${l}</button>`;}).join("")}
      </div>
    </div>`).join("");
  abrir(`
    <div class="grip"></div>
    <h3>${nombreCompleto(it)}</h3>
    <p class="sub">${money(it.pre)}${optsFor(it).some(g=>g.key==="asadero")?" · asadero +$"+CONFIG.asaderoExtra:""}</p>
    ${gruposHtml}
    <div class="qtyrow">
      <div class="qty">
        <button id="qmenos">–</button><span class="n" id="qn">1</span><button id="qmas">+</button>
      </div>
      <div style="font-weight:800;color:var(--rojo)" id="opPrecio"></div>
    </div>
    <button class="btn btn-rojo" style="margin-top:18px" id="agregar">Agregar al pedido</button>
  `);
  hoja.querySelectorAll(".optg").forEach(og=>{
    const key=og.dataset.key, multi=og.dataset.multi==="1";
    og.querySelectorAll(".chip").forEach(c=> c.onclick=()=>{
      if(multi){
        const v=c.dataset.v, arr=sel[key], i=arr.indexOf(v);
        if(i>=0) arr.splice(i,1); else arr.push(v);
        c.classList.toggle("sel");
      } else {
        og.querySelectorAll(".chip").forEach(x=>x.classList.remove("sel"));
        c.classList.add("sel"); sel[key]=c.dataset.v;
      }
      pintaOpPrecio();
    });
  });
  $("#qmenos").onclick=()=>{ selQty=Math.max(1,selQty-1); $("#qn").textContent=selQty; pintaOpPrecio(); };
  $("#qmas").onclick=()=>{ selQty++; $("#qn").textContent=selQty; pintaOpPrecio(); };
  $("#agregar").onclick=()=>{ addLinea(); cerrar(); };
  pintaOpPrecio();
}
function pintaOpPrecio(){
  const it=baseItem(selId); const pl=precioLinea(it,sel);
  const el=$("#opPrecio"); if(el) el.textContent=money(pl*selQty);
}
function addLinea(){
  const it=baseItem(selId); const opts=Object.assign({},sel); if(Array.isArray(opts.quitar)) opts.quitar=opts.quitar.slice();
  const key=lineKey(selId,opts);
  if(carrito[key]) carrito[key].qty+=selQty;
  else carrito[key]={id:selId, opts:opts, precio:precioLinea(it,opts), qty:selQty};
  refrescar();
}
function cambiaLinea(key,d){
  if(!carrito[key])return;
  carrito[key].qty+=d;
  if(carrito[key].qty<=0) delete carrito[key];
  refrescar(); if(overlay.classList.contains("on")) pasoResumen();
}
function refrescar(){
  const enCarrito={};
  for(const k in carrito) enCarrito[carrito[k].id]=true;
  document.querySelectorAll(".item").forEach(it=> it.classList.toggle("en-carrito", !!enCarrito[it.dataset.id]));
  const {n,t}=totales();
  $("#pillCount").textContent=n; $("#pillTotal").textContent=money(t);
  $("#barra").style.display = n>0 ? "block":"none";
}

/* ===== Paso 1: resumen ===== */
function pasoResumen(){
  const {n,t}=totales(); if(n===0){cerrar();return;}
  const lineas=Object.keys(carrito).map(k=>{
    const L=carrito[k], it=baseItem(L.id), op=optsTexto(L);
    return `<div class="linea">
      <div class="lz">
        <div class="nm">${nombreCompleto(it)}</div>
        ${op?`<div class="op">${op}</div>`:""}
        <div class="ctrl"><button data-m="${k}">–</button><span class="c">${L.qty}</span><button data-p="${k}">+</button></div>
      </div>
      <div class="pr">${money(L.precio*L.qty)}</div>
    </div>`;
  }).join("");
  abrir(`
    <div class="grip"></div>
    <div class="pasos"><i class="on"></i><i></i><i></i></div>
    <h3>Tu pedido</h3>
    <p class="sub">Ajusta cantidades o agrega más.</p>
    ${lineas}
    <div class="total-row"><span>Total a pagar</span><span class="big">${money(t)}</span></div>
    <button class="btn btn-rojo" style="margin-top:16px" id="aDatos">Continuar</button>
    <button class="btn btn-fant" style="margin-top:10px" id="seguir">Seguir agregando</button>
  `);
  hoja.querySelectorAll("[data-m]").forEach(b=> b.onclick=()=>cambiaLinea(b.dataset.m,-1));
  hoja.querySelectorAll("[data-p]").forEach(b=> b.onclick=()=>cambiaLinea(b.dataset.p,+1));
  $("#aDatos").onclick=pasoDatos;
  $("#seguir").onclick=cerrar;
}

/* ===== Paso 2: datos + tiempo ===== */
let datos={nombre:"",tel:"",hora:"",refresco:""};
const pideRefresco=()=>Object.keys(carrito).some(k=>baseItem(carrito[k].id).pideSabor);
function fmtHora(d){ let h=d.getHours(),m=d.getMinutes(); const ap=h<12?"am":"pm"; h=h%12||12; return h+":"+(m<10?"0"+m:m)+" "+ap; }
const ABRE=6, CIERRA=22, PASO=15; // horario 6am-10pm, slots de 15 min
function slotsDelDia(esHoy, lead){
  const out=[]; const now=new Date(); let start;
  if(esHoy){
    start=new Date(now.getTime()+lead*60000); start.setSeconds(0,0);
    const m=start.getMinutes(); start.setMinutes(m+((PASO-(m%PASO))%PASO));
    if(start.getHours()<ABRE){ start=new Date(now); start.setHours(ABRE,0,0,0); }
  } else { start=new Date(now.getTime()+86400000); start.setHours(ABRE,0,0,0); }
  const fin=new Date(start); fin.setHours(CIERRA,0,0,0);
  const cur=new Date(start);
  while(cur.getTime()<=fin.getTime()){ out.push(new Date(cur)); cur.setMinutes(cur.getMinutes()+PASO); }
  return out;
}
function pasoDatos(){
  const hayRefresco=pideRefresco();
  const lead=leadMin();
  const ahora=Date.now();
  const hoySlots = slotsDelDia(true, lead);
  const hayHoy = hoySlots.length>0;
  let diaSel = hayHoy ? "hoy" : "manana";
  abrir(`
    <div class="grip"></div>
    <div class="pasos"><i class="on"></i><i class="on"></i><i></i></div>
    <h3>¿Para quién es?</h3>
    <p class="sub">Para tenerlo listo cuando pases por él.</p>
    <div class="tiempo"><span>⏱️</span><div><b>Tiempo de preparación: mínimo ${lead} min</b> (todo se prepara fresco al momento). Elige a qué hora pasas.</div></div>
    <form id="formDatos">
    <div class="optg"><div class="ol">¿Cuándo pasas por él?</div>
      <div class="chips" id="dias">
        <button type="button" class="chip${diaSel==="hoy"?" sel":""}" data-dia="hoy" ${hayHoy?"":"disabled"}>Hoy${hayHoy?"":" (cerrado)"}</button>
        <button type="button" class="chip${diaSel==="manana"?" sel":""}" data-dia="manana">Mañana</button>
      </div>
    </div>
    <label class="campo">Hora de recolección
      <select id="slot"></select>
    </label>
    <label class="campo">Tu nombre
      <input id="f_nombre" type="text" placeholder="Ej. Juan Pérez" value="${datos.nombre}">
    </label>
    <label class="campo">Tu teléfono
      <input id="f_tel" type="tel" inputmode="numeric" placeholder="10 dígitos" value="${datos.tel}">
    </label>
    ${hayRefresco?`<label class="campo">🥤 ¿Qué refresco(s)? — sabor
      <input id="f_refresco" type="text" placeholder="Ej. Coca, Sprite..." value="${datos.refresco}"></label>`:""}
    <button type="submit" class="btn btn-rojo" style="margin-top:20px" id="aPago">Ir a pagar</button>
    </form>
  `);
  function pintaSlots(){
    const esHoy = diaSel==="hoy";
    const slots = esHoy ? hoySlots : slotsDelDia(false, lead);
    const diaTxt = esHoy ? "Hoy" : "Mañana";
    $("#slot").innerHTML = slots.map((d,i)=>{
      const lbl = diaTxt+" — "+fmtHora(d)+(esHoy&&i===0?" (lo más pronto)":"");
      return `<option value="${lbl}">${lbl}</option>`;
    }).join("");
    datos.hora = slots.length ? (diaTxt+" — "+fmtHora(slots[0])) : "";
  }
  hoja.querySelectorAll("#dias .chip").forEach(c=> c.onclick=()=>{
    if(c.hasAttribute("disabled")) return;
    diaSel=c.dataset.dia;
    hoja.querySelectorAll("#dias .chip").forEach(x=>x.classList.remove("sel"));
    c.classList.add("sel"); pintaSlots();
  });
  $("#slot").onchange=()=>{ datos.hora=$("#slot").value; };
  pintaSlots();
  $("#formDatos").addEventListener("submit", e=>{
    e.preventDefault();
    datos.nombre=$("#f_nombre").value.trim();
    datos.tel=$("#f_tel").value.trim();
    datos.hora=$("#slot").value || datos.hora;
    datos.refresco=hayRefresco ? $("#f_refresco").value.trim() : "";
    if(!datos.nombre || datos.tel.length<8){ alert("Pon tu nombre y un teléfono válido 🙂"); return; }
    if(hayRefresco && !datos.refresco){ alert("Especifica el sabor del refresco (Coca, etc.) 🥤"); return; }
    pasoPago();
  });
}

/* ===== Paso 3: confirmar pedido ===== */
function pasoPago(){
  const {t}=totales();
  abrir(`
    <div class="grip"></div>
    <div class="pasos"><i class="on"></i><i class="on"></i><i class="on"></i></div>
    <h3>Confirma tu pedido</h3>
    <p class="sub">Lo preparamos fresco y pagas al recoger.</p>
    <div class="total-row"><span>Total a pagar</span><span class="big">${money(t)}</span></div>
    <div class="candado"><span>🦐</span><div><b>Pago al recoger</b>
      Manda tu pedido por WhatsApp, lo preparamos fresquecito y pagas cuando pases por él (efectivo o transferencia).</div></div>
    <button class="btn btn-verde" style="margin-top:16px" id="enviar">Enviar pedido por WhatsApp</button>
    <p class="mini">Al enviar se abre WhatsApp con tu pedido <b>ya escrito</b>.</p>
  `);
  $("#enviar").onclick=enviarWhatsApp;
}

function enviarWhatsApp(){
  const {t}=totales();
  const folio="V"+Date.now().toString().slice(-5);
  const lineas=Object.keys(carrito).map(k=>{
    const L=carrito[k], it=baseItem(L.id), op=optsTexto(L);
    return `• ${L.qty}× ${nombreCompleto(it)}${op?" ("+op+")":""} — ${money(L.precio*L.qty)}`;
  }).join("\n");
  const msg=
`🦐 *NUEVO PEDIDO — ${CONFIG.negocio}*
Folio: ${folio}

${lineas}

*TOTAL: ${money(t)}*
💵 Pago al recoger
${datos.refresco?`\n🥤 Refresco(s): ${datos.refresco}`:""}
👤 ${datos.nombre}
📱 ${datos.tel}
⏰ Pasa por él: ${datos.hora || "lo antes posible"}
🏠 Para recoger`;
  const waUrl=`https://wa.me/${CONFIG.whatsappComanda}?text=${encodeURIComponent(msg)}`;
  window.open(waUrl,"_blank");
  pasoGracias(folio,waUrl);
}

function pasoGracias(folio,url){
  abrir(`
    <div class="grip"></div>
    <div style="text-align:center;padding:10px 0 6px">
      <div style="font-size:48px;line-height:1">📲</div>
      <h3 style="margin-top:8px">¡Casi listo! Falta 1 paso</h3>
      <div class="tiempo" style="text-align:left;margin-top:12px"><span>⚠️</span><div>Se abrió WhatsApp con tu pedido <b>ya escrito</b>. Solo presiona <b>ENVIAR ➤</b> ahí para que le llegue al negocio.<br><b>Si no lo envías, tu pedido NO nos llega.</b></div></div>
      <a class="btn btn-verde" style="margin-top:14px;text-decoration:none" href="${url}" target="_blank" rel="noopener">Abrir WhatsApp otra vez</a>
      <p class="sub" style="margin-top:12px">Tu folio es <b>${folio}</b>. Lo preparamos fresco y pagas al recoger.</p>
      <button class="btn btn-fant" style="margin-top:10px" id="nuevo">Hacer otro pedido</button>
    </div>
  `);
  $("#nuevo").onclick=()=>{
    for(const k in carrito) delete carrito[k];
    datos={nombre:"",tel:"",hora:"",refresco:""};
    refrescar(); cerrar();
  };
}

pintarMenu();
refrescar();
</script>
